<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Japan Trip App</title>
    <style>
        /* 全局样式 */
        :root { --theme-red: #c0172e; --bg-gray: #f5f6f8; --text-main: #333; --text-sub: #888; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #e0e0e0; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background-color: var(--bg-gray); min-height: 100vh; position: relative; padding-bottom: 90px; box-shadow: 0 0 15px rgba(0,0,0,0.1); overflow-x: hidden; }

        /* 顶部标题栏 */
        .top-header { padding: 20px 20px 10px 20px; background: white; }
        .top-header h2 { margin: 0; font-size: 20px; color: var(--text-main); }
        .top-header p { margin: 5px 0 0 0; font-size: 12px; color: var(--text-sub); display: flex; justify-content: space-between; }

        /* 页面切换控制 */
        .page { display: none; padding: 15px; }
        .page.active { display: block; }

        /* 行程列表卡片 */
        .trip-card { background: white; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.04); cursor: pointer; }
        .trip-date { background-color: var(--theme-red); color: white; width: 65px; height: 75px; border-radius: 12px 0 0 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .trip-date strong { font-size: 18px; }
        .trip-date span { font-size: 11px; margin-top: 3px; opacity: 0.9; }
        .trip-info { padding: 0 15px; flex-grow: 1; font-size: 16px; font-weight: bold; color: var(--text-main); }
        .trip-arrow { padding-right: 15px; color: #ccc; font-size: 14px; }

        /* 记账与备注页面样式（静态展示用） */
        .expense-card-red { background: linear-gradient(135deg, #d31a38, #b01026); color: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .expense-card-red p { margin: 0 0 5px 0; font-size: 13px; opacity: 0.9; }
        .expense-card-red h1 { margin: 0 0 5px 0; font-size: 32px; }
        .expense-card-red .rate { font-size: 12px; opacity: 0.8; }
        .note-category { border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; background-color: #e8f5e9; color: #2e7d32; }

        /* 底部导航栏 */
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-sub); text-decoration: none; cursor: pointer; }
        .nav-icon { width: 45px; height: 35px; display: flex; justify-content: center; align-items: center; border-radius: 18px; font-size: 20px; margin-bottom: 4px; transition: 0.3s; }
        .nav-item.active { color: var(--theme-red); font-weight: bold; }
        .nav-item.active .nav-icon { background-color: #fde8eb; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-header">
        <h2>Customized Travel Web App</h2>
        <p><span>(put your name here)</span> <span>Designed by isonnn</span></p>
    </div>

    <div id="page-itinerary" class="page active">
        <p style="text-align: center; color: var(--text-sub); margin-top: 50px;">🔄 正在同步 Google Sheet 资料...</p>
    </div>

    <div id="page-expense" class="page">
        <div class="expense-card-red">
            <p>总支出 (Total Spent)</p>
            <h1>RM 0.00</h1>
            <div class="rate">记账功能准备中...</div>
        </div>
    </div>

    <div id="page-notes" class="page">
        <div class="note-category"><span>暂无备注数据</span></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('itinerary', this)">
            <div class="nav-icon">📅</div><span>行程</span>
        </div>
        <div class="nav-item" onclick="switchTab('hotel', this)">
            <div class="nav-icon">🏨</div><span>酒店</span>
        </div>
        <div class="nav-item" onclick="switchTab('expense', this)">
            <div class="nav-icon">💰</div><span>记账</span>
        </div>
        <div class="nav-item" onclick="switchTab('notes', this)">
            <div class="nav-icon">📝</div><span>备注</span>
        </div>
    </div>
</div>

<script>
    // 切换底部菜单的功能
    function switchTab(tabName, element) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        const activePage = document.getElementById('page-' + tabName);
        if(activePage) activePage.classList.add('active');
    }

    // ==========================================
    // 🌟 在这里贴上你表格的 CSV 链接！！！
    // ==========================================
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSArwOsSbsvY4h0C2J4tzQMJemATwDZGRbrZqM06etsGGA3GO8NDGoeysD0QHziK_Y00-GuzKom9ks4/pub?output=csv';

    // 抓取 Google Sheet 数据并生成红白卡片
    fetch(csvUrl)
        .then(response => response.text())
        .then(data => {
            const rows = data.split('\n').slice(1); // 跳过第一行表头
            const listContainer = document.getElementById('page-itinerary');
            listContainer.innerHTML = ''; // 清除“正在加载”的字眼

            rows.forEach(row => {
                const columns = row.split(','); 
                if (columns.length >= 3 && columns[0].trim() !== '') {
                    const day = columns[0];   // 第一列：天数 (例如 D1)
                    const date = columns[1];  // 第二列：日期 (例如 20/2)
                    const title = columns[2]; // 第三列：大标题 (例如 大阪市区)

                    // 把抓取到的数据，套进漂亮的卡片 HTML 里
                    const cardHtml = `
                        <div class="trip-card">
                            <div class="trip-date"><strong>${day}</strong><span>${date}</span></div>
                            <div class="trip-info">${title}</div>
                            <div class="trip-arrow">▼</div>
                        </div>
                    `;
                    listContainer.innerHTML += cardHtml;
                }
            });
        })
        .catch(error => {
            document.getElementById('page-itinerary').innerHTML = '<p style="color:red; text-align:center;">同步失败，请检查链接。</p>';
        });
</script>

</body>
</html>

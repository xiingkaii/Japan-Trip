<script>
        function generateMobileAppIcon() {
            try {
                const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#C41E3A'; ctx.fillRect(0, 0, 512, 512);
                ctx.fillStyle = '#FFFFFF';
                const planePath = new Path2D('M448 336v-40L288 192V79.2c0-17.7-14.8-31.2-32-31.2s-32 13.5-32 31.2V192L64 296v40l160-48v113.6l-48 31.8v33.6l80-25.6 80 25.6v-33.6l-48-31.8V288l160 48z');
                ctx.fill(planePath);
                document.getElementById('apple-icon').href = canvas.toDataURL('image/png');
            } catch (e) { console.log("Icon skipped."); }
        }

        // 🌟 你的四条绝对正确的链接
        const urls = {
            itinerary: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSArwOsSbsvY4h0C2J4tzQMJemATwDZGRbrZqM06etsGGA3GO8NDGoeysD0QHziK_Y00-GuzKom9ks4/pub?gid=0&single=true&output=csv',
            hotel: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSArwOsSbsvY4h0C2J4tzQMJemATwDZGRbrZqM06etsGGA3GO8NDGoeysD0QHziK_Y00-GuzKom9ks4/pub?gid=1936513680&single=true&output=csv',
            settings: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSArwOsSbsvY4h0C2J4tzQMJemATwDZGRbrZqM06etsGGA3GO8NDGoeysD0QHziK_Y00-GuzKom9ks4/pub?gid=1983181291&single=true&output=csv',
            other: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSArwOsSbsvY4h0C2J4tzQMJemATwDZGRbrZqM06etsGGA3GO8NDGoeysD0QHziK_Y00-GuzKom9ks4/pub?gid=1982496973&single=true&output=csv'
        };

        let config = { home: 'MYR', foreign: 'JPY', rate: 0.026 }; 
        const icons = { 'Food': 'fa-hamburger', 'Transport': 'fa-train', 'Grocery': 'fa-shopping-cart', '药妆店': 'fa-medkit', 'Entertainment': 'fa-gamepad', 'Ticket': 'fa-ticket-alt', 'Souvenir': 'fa-gift', 'Shopping': 'fa-shopping-bag', 'Accommodation': 'fa-bed', 'Others': 'fa-receipt' };
        
        // 🌟 防死机护盾 1：防止本地存储出错导致全盘崩溃
        let expenses = [];
        try {
            const saved = localStorage.getItem('my_trip_expenses');
            if (saved) expenses = JSON.parse(saved);
        } catch(e) { expenses = []; }

        window.onload = function() {
            generateMobileAppIcon();
            
            // 🌟 防死机护盾 2：取消所有拦截机制，四个功能各自独立运行，谁也不影响谁！
            loadItinerary();
            loadHotels();
            loadOthers();
            loadSettings();
        };

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // === 1. 行程逻辑 (绝对防弹版) ===
        function loadItinerary() {
            Papa.parse(urls.itinerary, { 
                download: true, 
                complete: function(res) {
                    try {
                        const data = res.data;
                        if(!data || data.length < 5) {
                            document.getElementById('itinerary-container').innerHTML = "<p style='text-align:center; padding:30px; color:#888;'>无法读取行程，请检查表格 gid=0 是否正确。</p>";
                            document.getElementById('app-title').innerText = "加载失败";
                            return;
                        }
                        
                        if(data[0] && data[0][1]) document.getElementById('app-title').innerText = data[0][1];
                        if(data[1] && data[1][1]) document.getElementById('app-subtitle').innerText = data[1][1];
                        
                        let daysMap = new Map();
                        data.forEach((r, index) => {
                            if(index < 4) return; // 严格跳过前4行表头
                            if(!r || !r[0]) return; // 跳过空行
                            const colA = String(r[0]).trim();
                            if(colA === '' || colA === 'Day' || colA === '天数 (Day)') return;
                            
                            if(!daysMap.has(colA)) { daysMap.set(colA, { n: colA, d: r[1] || '', l: r[3] || '行程', e: [] }); }
                            if(r[3] || r[4]) { 
                                daysMap.get(colA).e.push({ 
                                    time: r[2] || '', 
                                    act: r[4] || r[3] || '未填写活动', 
                                    rem: r[5] || '', 
                                    map: r[6] || '', 
                                    ref: r[7] || '' 
                                }); 
                            }
                        });

                        const cont = document.getElementById('itinerary-container');
                        cont.innerHTML = "";
                        daysMap.forEach(d => {
                            let evs = d.e.map(e => {
                                // 安全处理所有 undefined 报错
                                const mapLink = e.map && String(e.map).startsWith('http') ? `<a href="${e.map}" target="_blank" class="nav-btn">📍 路线 (Route)</a>` : '';
                                const refLink = e.ref && String(e.ref).startsWith('http') ? `<a href="${e.ref}" target="_blank" class="nav-btn" style="background: #444; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">🔗 参考 Link</a>` : '';
                                
                                return `
                                <div class="timeline-item">
                                    <div class="timeline-dot"></div>
                                    <span class="event-time">${e.time}</span>
                                    <div class="event-act">${e.act}</div>
                                    ${e.rem ? `<div class="event-remark">${e.rem}</div>` : ''}
                                    ${mapLink || refLink ? `<div style="display: flex; gap: 8px; flex-wrap: wrap;">${mapLink}${refLink}</div>` : ''}
                                </div>`;
                            }).join('');
                            
                            cont.innerHTML += `
                                <div class="card">
                                    <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
                                        <div class="header-left"><div class="day-num">${d.n}</div><div class="day-date">${d.d}</div></div>
                                        <div class="header-right"><div class="day-title">${d.l}</div><i class="fas fa-chevron-down toggle-icon"></i></div>
                                    </div>
                                    <div class="card-body">${evs}</div>
                                </div>`;
                        });
                    } catch (err) {
                        document.getElementById('itinerary-container').innerHTML = `<p style="color:red; text-align:center; padding:20px;">行程代码报错: ${err.message}</p>`;
                    }
                },
                error: function() {
                    document.getElementById('app-title').innerText = "网络连接失败";
                }
            });
        }

        // === 2. 酒店逻辑 (绝对防弹版) ===
        function loadHotels() {
            Papa.parse(urls.hotel, { 
                download: true, 
                complete: function(res) {
                    try {
                        const cont = document.getElementById('hotel-container');
                        cont.innerHTML = "";
                        if(!res.data || res.data.length < 2) {
                            cont.innerHTML = "<p style='text-align:center; padding:30px; color:#888;'>没有找到酒店数据。</p>";
                            return;
                        }
                        
                        res.data.slice(1).forEach((h, i) => {
                            if(!h || !h[2] || String(h[2]).trim() === '') return; 
                            const tag = h[4] || '住宿';
                            const tagClass = String(tag).toLowerCase().includes('airbnb') ? 'tag-airbnb' : 'tag-hotel';
                            const mapBtn = (h[6] && String(h[6]).startsWith('http')) ? `<a href="${h[6]}" target="_blank" class="btn-nav"><i class="fas fa-location-arrow"></i> 导航前往</a>` : `<button class="btn-nav" disabled style="opacity:0.5;">暂无导航</button>`;
                            const addr = h[3] || '暂无地址';
                            
                            cont.innerHTML += `
                                <div class="hotel-card">
                                    <span class="hotel-tag ${tagClass}">${tag}</span>
                                    <div class="hotel-header-row"><i class="fas fa-map-marker-alt hotel-icon-pin"></i><div class="hotel-title">${i + 1}. ${h[1] || ''}: ${h[2]}</div></div>
                                    <div class="hotel-date">${h[0] || ''}</div>
                                    <div class="hotel-address-box"><div>${addr}</div>${h[5] ? `<span class="hotel-remark">${h[5]}</span>` : ''}</div>
                                    <div class="hotel-btns">
                                        ${mapBtn}
                                        <button class="btn-copy" onclick="copyAddress('${addr.replace(/'/g, "\\'")}')"><i class="fas fa-copy"></i> 复制地址</button>
                                    </div>
                                </div>`;
                        });
                    } catch (err) {
                        document.getElementById('hotel-container').innerHTML = `<p style="color:red; text-align:center;">酒店代码报错: ${err.message}</p>`;
                    }
                }
            });
        }

        function copyAddress(text) {
            if(!text) return;
            const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("✅ 地址已复制");
        }

        // === 3. 其他/备注逻辑 (绝对防弹版) ===
        function loadOthers() {
            Papa.parse(urls.other, { 
                download: true, 
                complete: function(res) {
                    try {
                        const cont = document.getElementById('other-container');
                        if(!res.data || res.data.length < 2) {
                            cont.innerHTML = "<p style='text-align:center; padding:30px; color:#888;'>没有找到其他清单数据。</p>";
                            return;
                        }
                        
                        let notesMap = new Map();
                        res.data.slice(1).forEach(r => {
                            if(!r || !r[0] || String(r[0]).trim() === '') return; 
                            const cat = String(r[0]).trim();
                            const color = r[1] || 'Green';
                            if(!notesMap.has(cat)) { notesMap.set(cat, { cat: cat, color: color, items: [] }); }
                            if(r[2] || r[3]) { notesMap.get(cat).items.push({ loc: r[2] || '', shop: r[3] || '', map: r[4] || '' }); }
                        });

                        cont.innerHTML = "";
                        notesMap.forEach(n => {
                            const bgClass = String(n.color).toLowerCase() === 'yellow' ? 'note-yellow' : 'note-green';
                            let itemsHtml = n.items.map(i => `
                                <div class="note-item-row">
                                    <div class="note-loc">${i.loc}</div>
                                    <div class="note-shop">${i.shop}</div>
                                    <div class="note-nav">
                                        ${i.map && String(i.map).startsWith('http') ? `<a href="${i.map}" target="_blank" class="note-go-btn">📍 GO</a>` : ''}
                                    </div>
                                </div>`).join('');
                            
                            if (n.items.length > 0) {
                                 itemsHtml = `<div class="note-item-header"><div>地点</div><div>推荐店铺</div><div>导航</div></div>` + itemsHtml;
                            } else {
                                 itemsHtml = `<div style="text-align:center; color:#999; font-size:0.8rem;">暂无详细内容</div>`;
                            }
                            cont.innerHTML += `
                                <div class="note-card">
                                    <div class="note-header ${bgClass}" onclick="this.parentElement.classList.toggle('open')">
                                        <div style="font-weight: 800; color: #333; font-size: 0.95rem;">${n.cat}</div>
                                        <i class="fas fa-caret-down note-arrow"></i>
                                    </div>
                                    <div class="note-body">${itemsHtml}</div>
                                </div>`;
                        });
                    } catch (err) {
                        document.getElementById('other-container').innerHTML = `<p style="color:red; text-align:center;">其他清单代码报错: ${err.message}</p>`;
                    }
                }
            });
        }

        // === 4. 记账与结账逻辑 (保持不变) ===
        function loadSettings() {
            Papa.parse(urls.settings, { 
                download: true, 
                complete: function(res) {
                    try {
                        const s = res.data;
                        if(s && s.length > 2) {
                            config.home = s[1][1] || 'MYR'; 
                            config.foreign = s[2][1] || 'USD';
                            config.rate = parseFloat(s[1][2]) || 0.026; 
                            document.getElementById('rate-display').innerText = `汇率参考: 1 ${config.foreign} = ${config.rate} ${config.home}`;
                            document.getElementById('amt-input').placeholder = `金额 (${config.foreign})`;
                        }
                    } catch (e) {} finally {
                        renderExpenses(); // 无论设置读取成不成功，都强制显示记账页面！
                    }
                }
            });
        }

        function addExpense() {
            const amt = parseFloat(document.getElementById('amt-input').value);
            const note = document.getElementById('note-input').value;
            const cat = document.getElementById('cat-input').value;
            const payer = document.getElementById('payer-input').value;
            const datetimeVal = document.getElementById('datetime-input').value;
            
            if (!amt) return alert("请输入金额");

            const finalDate = datetimeVal ? new Date(datetimeVal) : new Date();

            const newEx = {
                id: Date.now(), amount: amt, note: note || cat, cat: cat,
                payer: payer, icon: icons[cat] || 'fa-receipt', timestamp: finalDate.getTime() 
            };
            
            expenses.push(newEx);
            localStorage.setItem('my_trip_expenses', JSON.stringify(expenses));
            
            document.getElementById('amt-input').value = '';
            document.getElementById('note-input').value = '';
            document.getElementById('datetime-input').value = ''; 
            renderExpenses();
        }

        function deleteEx(id) {
            if(confirm("删除此记录?")) {
                expenses = expenses.filter(e => e.id !== id);
                localStorage.setItem('my_trip_expenses', JSON.stringify(expenses));
                renderExpenses();
            }
        }

        function settleDebt(payer, receiver, amount) {
            if(!confirm(`确定已结清？将记录: ${payer} 转账给 ${receiver} ${amount} JPY`)) return;
            const now = new Date();
            const newEx = {
                id: Date.now(), amount: amount, note: `${payer} ➔ ${receiver}`, 
                cat: 'Settlement', payer: payer, icon: 'fa-exchange-alt', timestamp: now.getTime()
            };
            expenses.push(newEx);
            localStorage.setItem('my_trip_expenses', JSON.stringify(expenses));
            renderExpenses();
        }

        function renderExpenses() {
            const dtInput = document.getElementById('datetime-input');
            if (dtInput && !dtInput.value) {
                const now = new Date();
                const tzOffset = now.getTimezoneOffset() * 60000;
                dtInput.value = (new Date(now - tzOffset)).toISOString().slice(0, 16);
            }

            const list = document.getElementById('expense-list');
            list.innerHTML = '';
            
            let totalHome = 0; let totalForeign = 0; 
            let totalXKYM = 0; let totalCLAL = 0;

            expenses.sort((a, b) => {
                const timeA = a.timestamp || a.id; 
                const timeB = b.timestamp || b.id;
                return timeB - timeA;
            });

            let lastDateStr = null;

            expenses.forEach(e => {
                const amt = parseFloat(e.amount);
                const homeVal = amt * config.rate;
                const currentPayer = e.payer || 'XK YM';
                const isSettlement = (e.cat === 'Settlement');

                if (isSettlement) {
                    if (currentPayer === 'CL AL') { totalCLAL += amt; totalXKYM -= amt; } 
                    else { totalXKYM += amt; totalCLAL -= amt; }
                } else {
                    totalHome += homeVal; totalForeign += amt; 
                    if(currentPayer === 'XK YM') { totalXKYM += amt; } else { totalCLAL += amt; }
                }

                const dateObj = new Date(e.timestamp || e.id);
                const dateStr = dateObj.toLocaleDateString(); 
                const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                if (lastDateStr !== dateStr) {
                    list.innerHTML += `
                        <div style="text-align:center; margin: 25px 0 15px 0; position: relative;">
                            <div style="position: absolute; top: 50%; left: 0; right: 0; border-top: 1px dashed #ccc; z-index: 1;"></div>
                            <span style="position: relative; background: var(--bg); padding: 0 15px; color: #888; font-size: 0.8rem; font-weight: bold; z-index: 2; border-radius: 10px;">
                                📅 ${dateStr}
                            </span>
                        </div>`;
                    lastDateStr = dateStr;
                }

                const iconClass = isSettlement ? 'fa-exchange-alt' : (e.icon || 'fa-receipt');
                const bgCol = isSettlement ? '#E8F5E9' : '#FFF0F2';
                const textCol = isSettlement ? '#2E7D32' : '#C41E3A';
                const titleNote = isSettlement ? '🤝 结账清零' : e.note;
                const payerNote = isSettlement ? `🕒 ${timeStr} • <strong style="color:${textCol}">${e.note}</strong>` : `🕒 ${timeStr} • <strong style="color:${textCol}">${currentPayer}</strong> 付款`;

                list.innerHTML += `
                    <div class="expense-item">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div style="width:40px;height:40px;background:${bgCol};color:${textCol};border-radius:10px;display:flex;align-items:center;justify-content:center"><i class="fas ${iconClass}"></i></div>
                            <div>
                                <div style="font-weight:700;color:#333">${titleNote}</div>
                                <div style="font-size:0.75rem;color:#999;margin-top:2px">${payerNote}</div>
                            </div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:800;font-size:1.1rem;color:${textCol}">${amt.toLocaleString()} ${config.foreign}</div>
                            ${isSettlement ? '' : `<div style="font-size:0.75rem;color:#bbb">≈ ${homeVal.toFixed(2)} ${config.home}</div>`}
                            <button class="btn-del" onclick="deleteEx(${e.id})">×</button>
                        </div>
                    </div>`;
            });
            
            document.getElementById('display-total').innerText = `${totalForeign.toLocaleString()} ${config.foreign}`;
            if(!document.getElementById('rate-display').innerText.includes('汇率参考')) {
                document.getElementById('rate-display').innerHTML = `≈ ${totalHome.toFixed(2)} ${config.home} &nbsp;|&nbsp; 汇率 1 ${config.foreign} = ${config.rate} ${config.home}`;
            }

            const diff = totalXKYM - totalCLAL;
            const oweAmountNum = Math.round(Math.abs(diff / 2)); 
            const oweAmountStr = oweAmountNum.toLocaleString(); 
            let settleHtml = "";
            
            if (diff > 0) {
                settleHtml = `
                    <div style="display:flex; justify-content:space-between; align-items:center; text-align:left;">
                        <div>CL & AL 需转账给 XK & YM<br><span style="font-size: 1.35rem; font-weight: 900; color: #FFF; display:inline-block; margin-top:4px;">${oweAmountStr} ${config.foreign}</span></div>
                        <button onclick="settleDebt('CL AL', 'XK YM', ${oweAmountNum})" style="background:#FFD700; color:#000; border:none; padding:8px 15px; border-radius:20px; font-weight:800; font-size:0.85rem; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.2);">✅ Settled</button>
                    </div>`;
            } else if (diff < 0) {
                settleHtml = `
                    <div style="display:flex; justify-content:space-between; align-items:center; text-align:left;">
                        <div>XK & YM 需转账给 CL & AL<br><span style="font-size: 1.35rem; font-weight: 900; color: #FFF; display:inline-block; margin-top:4px;">${oweAmountStr} ${config.foreign}</span></div>
                        <button onclick="settleDebt('XK YM', 'CL AL', ${oweAmountNum})" style="background:#FFD700; color:#000; border:none; padding:8px 15px; border-radius:20px; font-weight:800; font-size:0.85rem; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.2);">✅ Settled</button>
                    </div>`;
            } else {
                settleHtml = `<div style="text-align:center;">目前账目已平，互不相欠 😎</div>`;
            }
            document.getElementById('settle-text').innerHTML = settleHtml;
        }

        function copyReport() {
            if (expenses.length === 0) return alert("还没有记账记录哦！");
            let report = `🧾 旅游消费账单 (${new Date().toLocaleDateString()})\n------------------------\n💰 总支出: ${document.getElementById('display-total').innerText}\n------------------------\n⚖️ 【结账结果】\n${document.getElementById('settle-text').innerText.replace('✅ Settled', '')}\n------------------------\n\n`;
            expenses.forEach(e => {
                const amt = parseFloat(e.amount); const homeVal = (amt * config.rate).toFixed(2); const payer = e.payer || 'XK YM';
                const dateObj = new Date(e.timestamp || e.id); const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                if (e.cat === 'Settlement') {
                    report += `▪️ [${dateObj.toLocaleDateString()} ${timeStr}] 🤝 结账清零\n   ${e.
